# Publishes a Shorebird Android release from GitHub Actions.
# Prerequisites:
# 1) Replace app_id in shorebird.yaml (run `shorebird init` locally once and push).
# 2) Repo secret SHOREBIRD_TOKEN (Shorebird Console → Account → API Keys).
# 3) Android signing for release builds (key.properties / keystore) — same as `flutter build apk`.
name: Shorebird Release (Android)

on:
  workflow_dispatch:

env:
  SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Shorebird Release
        uses: shorebirdtech/shorebird-release@v1
        with:
          platform: android
          flutter-version: "3.32.8"
